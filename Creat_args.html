    <style>
        /* Premium Inline Customization for Your Minimalist Vision */
        .minimal-title {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px ;
            color: #ffffff;
            margin-bottom: 2rem;
            text-align: center;
        }

        .premium-input-container {
            display: flex;

            gap: 0.8rem;

        }

        .premium-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af; /* Soft slate gray */
            padding-left: 0.5rem;
        }

        .premium-input {
            width: 100%;

            border-radius: 16px; /* Smooth rounded interface edge */
            padding: 18px 24px;
            color: #ffffff;
            font-size: 1.1rem;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-input:focus {
            border-color: #3b82f6; /* Electric Blue focus line */
            background: #0b0f19; /* Deep abyss black focus state */
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), 0 10px 30px rgba(0, 0, 0, 0.4);
        }
    </style>

<body>

    <!-- Main Body Layout -->

            <div class="creation-card" id="creation-workspace" style="display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: transparent; box-shadow: none;">
                
                <h1 class="minimal-title">⚔️ Start Duel ⚔️</h1>

                <div class="premium-input-container">

                    <label class="premium-label" for="argument-point">

                        Topic


                    </label>

                 <input type="text" id="argument-point"  class="premium-input" placeholder="eg: Ronaldo is better than messi  ">

                </div>

                <!-- Trigger Action Button styled elegantly below -->
                <button class="arena-submit-btn" id="btn-ignite" style="max-width: 500px; margin-top: 2rem; padding: 1.1rem;">

                    OR 

                </h2>


                <button class="arena-submit-btn" style="max-width: 500px; margin-top: 2rem; padding: 1.1rem;">

                    <span>
                        Invite

            </div>

            <!-- Matchmaking Radar State (Kept intact so the screen shifts to loading nicely) -->
            <div class="radar-container" id="matchmaking-status" style="display: none;">

            });

    <script>
        const socket = io();

        const btnIgnite = document.getElementById('btn-ignite'); //start button 

        const workspace = document.getElementById('creation-workspace'); //the whole div in which the whole code is present

        const matchmakingStatus = document.getElementById('matchmaking-status'); //that circle which shows the time 

        const timerDisplay = document.getElementById('timer-display');
        const btnCancel = document.getElementById('btn-cancel-queue');

        const argumentInput = document.getElementById('argument-point'); //the input box itself 

        let countdownInterval; //the time countdown from 3 min to 0s 

        function startTimer(durationInSeconds) { //basically calculates the time 

            let timeRemaining = durationInSeconds; //assighing that time as the parameter in which i will call lateer

            countdownInterval = setInterval(() => {
                let minutes = Math.floor(timeRemaining / 60);
                let seconds = timeRemaining % 60;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                timerDisplay.textContent = `${minutes}:${seconds}`;

                if (--timeRemaining < 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.textContent = "Expired";
                }
            }, 1000);
        }

        btnIgnite.addEventListener('click', () => {
            const thesis = argumentInput.value.trim();

            if(!thesis) {
                alert('Please enter a topic before the battle '); //alerts if the input box is not filled 
                return;
            }

            workspace.style.display = 'none';
            matchmakingStatus.style.display = 'flex';
            
            startTimer(180); 

            socket.emit('join_queue', { 
                mode: '1v1',
                
                thesis: thesis
            });
        });

        btnCancel.addEventListener('click', () => {
            clearInterval(countdownInterval);
            matchmakingStatus.style.display = 'none';
            workspace.style.display = 'flex';
        });

        socket.on('match_found', (data) => {
            clearInterval(countdownInterval);

            window.location.href = `/live?match=${data.matchId}`;

            
        });
    </script>
