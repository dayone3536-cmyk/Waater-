    <script>
    const socket = io();

    const btnIgnite = document.getElementById('btn-ignite');
    const workspace = document.getElementById('creation-workspace');
    const matchmakingStatus = document.getElementById('matchmaking-status');
    const timerDisplay = document.getElementById('timer-display');
    const btnCancel = document.getElementById('btn-cancel-queue');
    const btnInviteMatch = document.getElementById('btn-invite-friend'); // matches your existing button id
    const argumentInput = document.getElementById('argument-point');

    let countdownInterval;
    let myCurrentMatchId = null; // the id of the duel WE created, once server confirms it

    function startTimer(durationInSeconds) {
        let timeRemaining = durationInSeconds;
        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            timerDisplay.textContent = `${minutes}:${seconds}`;
            if (--timeRemaining < 0) {
                clearInterval(countdownInterval);
                timerDisplay.textContent = "Expired";
            }
        }, 1000);
    }

    btnIgnite.addEventListener('click', () => {
        const thesis = argumentInput.value.trim();

        if (!thesis) {
            alert('Please enter a topic before the battle ');
            return;
        }

        workspace.style.display = 'none';
        matchmakingStatus.style.display = 'flex';

        startTimer(180);

        socket.emit('join_queue', {
            mode: '1v1',
            thesis: thesis
        });
    });

    // Server confirms our duel's own ID right after creating it

    socket.on('duel_created', (data) => {
        myCurrentMatchId = data.matchId;
    });

    // Invite button — only works once we have a matchId from the server

    btnInviteMatch.addEventListener('click', () => {
        if (!myCurrentMatchId) {
            alert('Still setting up your duel — try again in a second.');
            return;
        }

        const thesis = argumentInput.value.trim();
        const inviteLink = `${window.location.origin}/Create?matchId=${myCurrentMatchId}`;

        if (navigator.share) {
            navigator.share({

                title: 'Want to challenge me ? ',

                text: `Debate me on: "${thesis}"`,
                url: inviteLink

            }).catch(() => {});

        } else {
            navigator.clipboard.writeText(inviteLink).then(() => {

                alert('Invite link copied to clipboard!\n' + inviteLink);

            });
        }
    });

    btnCancel.addEventListener('click', () => {

        clearInterval(countdownInterval);

        // Tell server to remove this duel from the queue

        if (myCurrentMatchId) {
            socket.emit('leave_queue', { matchId: myCurrentMatchId });
        }

        matchmakingStatus.style.display = 'none';
        workspace.style.display = 'flex';
        myCurrentMatchId = null;

    });

    // If THIS page load is User B opening an invite link

    window.addEventListener('DOMContentLoaded', () => {
        
        const params = new URLSearchParams(window.location.search);
        const inviteMatchId = params.get('matchId');

        if (inviteMatchId) {
            workspace.style.display = 'none';
            matchmakingStatus.style.display = 'flex';
            timerDisplay.textContent = "Joining...";

            socket.emit('join_match', { matchId: inviteMatchId });
        }
    });

    // If the duel was already claimed/cancelled before User B clicked
    socket.on('match_error', (data) => {
        alert(data.message);
        window.location.href = '/Create';
    });

    // Fires for BOTH creator and challenger once paired
    socket.on('match_found', (data) => {
        clearInterval(countdownInterval);
        window.location.href = `/live?match=${data.matchId}&role=${data.role}`;
    });

</script>
