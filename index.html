<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/style.css" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Colloseum </title>
    

</head>
<body>

    <style>

        .duel-card {
            background: linear-gradient(145deg, #161b27, #1a2030);
            border: 1px solid #262d3d;
            border-radius: 14px;
            padding: 18px 22px;
            margin: 0 28px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: border-color .2s ease, transform .2s ease;
        }

        .duel-card:hover {
            border-color: #3b4356;
            transform: translateY(-2px);
        }

        .duel-card-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .duel-thesis {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin: 0;
            line-height: 1.4;
        }

        .duel-age {
            font-size: .8rem;
            color: #8b94a7;
        }

        .duel-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .duel-reactions {
            display: flex;
            gap: 8px;
        }

        .reaction-btn {
            background: #0f1320;
            border: 1px solid #2a3142;
            color: #9ca3af;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: .8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .15s ease, color .15s ease, border-color .15s ease;
        }

        .reaction-btn:hover {
            border-color: #3b4356;
            color: #e5e7eb;
        }

        .reaction-btn.liked {
            color: #22c55e;
            border-color: #22c55e44;
            background: #22c55e1a;
        }

        .reaction-btn.disliked {
            color: #ef4444;
            border-color: #ef444444;
            background: #ef44441a;
        }

        .join-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s ease;
        }

        .join-btn:hover {
            background: #0e67f7;
        }

    </style>





    <!-- 1. The Fixed Top Header -->

    <header class="top-navbar">
        <div class="nav-left-group">

            <span class="brand-logo"> Waater </span>

        </div>
        
        <div class="search-container">
            <input type="text" class="global-search" placeholder="Search the arena...">
        </div>

 
    </header>

    <!-- 2. The Multi-Column Environment -->
    <div class="app-body">
        
        <!-- Left Sidebar Options -->
        <nav class="sidebar">

            <a href="/" style="text-decoration: none;">

                <div class="nav-item active">Home</div>

            </a>
            
            <a href="/dueal" style="text-decoration: none;">
 
                <div class="nav-item"> incoming duels  ⚔️⚔️ </div>

            </a>

            <a href="/Create" style="text-decoration: none;">

                <div class="nav-item"> Create duel 🥷🥷 </div>

            </a>


            
        </nav>

        <!-- 3. The Core Open Blank Canvas -->
        <main class="main-content-canvas">

            <div class="feed-header" style="display:flex; justify-content:space-between; align-items:center; padding: 24px 28px 12px;">
                
                <!-- <h2 style="font-size:1.2rem; font-weight:700;">🔴 Live Now</h2>
                
                <span id="match-count" style="font-size:.85rem; color:#9ca3af; background:#1f2635; padding:4px 12px; border-radius:999px;">0 live</span>

                    <h2 style="font-size:1.2rem; font-weight:700;">📜 Past Duels</h2>
                </div>

                <div id="past-feed">

                </div>


            </div>

            
            <div id="duel-feed">
                <div class="empty-feed-placeholder">
                    
                    <h2>The Arena is Empty</h2>
                    
                    <p>No debates live right now.</p>
                
                </div>
            </div>

        </main>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        console.log("Reached the index html! ")


        const socket  = io();
        
        const feed    = document.getElementById('duel-feed');
        const countEl = document.getElementById('match-count');

        socket.on('update_live_matches', (matches) => {
            feed.innerHTML = '';
            countEl.textContent = `${matches.length} live`;

            if (matches.length === 0) {
                feed.innerHTML = `
                    <div class="empty-feed-placeholder">
                        <h2>The Arena is Empty</h2>
                        <p>No debates live right now.</p>
                    </div>`;
                return;
            }

            matches.forEach(match => {
                const card = document.createElement('div');
                card.className = 'duel-card';

                card.innerHTML = `

                    <div class="duel-card-body">
                        <p class="duel-thesis">${escapeHtml(match.thesis)}</p>
                        <span class="duel-age">👁 ${match.spectatorCount} watching</span>
                    </div>
                    <button class="join-btn" data-room="${match.roomId}">
                        👁 Watch Live
                    </button>
                `;

                card.querySelector('.join-btn').addEventListener('click', () => {
                    window.location.href = `/live?match=${match.roomId} `;
                });

                feed.appendChild(card);

            

            });

        });

        console.log("finished making the div it was succesful!")

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        console.log("finished making the div it was succesful! 2 ")


        async function loadPastMatches() {

            try {
                const res = await fetch('/past-matches');
                const matches = await res.json();

                const pastFeed = document.getElementById('past-feed');
                pastFeed.innerHTML = '';

                if (!matches || matches.length === 0) {
                    pastFeed.innerHTML = `<div class="empty-feed-placeholder"><p>No past duels yet.</p></div>`;
                    return;
                }

                matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'duel-card';

                    const endedLabel = match.end_reason
                        ? `Ended: ${escapeHtml(match.end_reason)}`
                        : 'Ended';

                    card.innerHTML = `
                        <div class="duel-card-body">
                            <p class="duel-thesis">${escapeHtml(match.thesis)}</p>
                            <span class="duel-age">${endedLabel}${match.winner_role ? ` · Winner: ${escapeHtml(match.winner_role)}` : ''}</span>
                        </div>
                        <button class="join-btn" data-room="${match.room_id}">
                            📼 Watch Replay
                        </button>
                    `;

                    card.querySelector('.join-btn').addEventListener('click', () => {
                        window.location.href = `/live?match=${match.room_id}&replay=1`;
                    });

                    pastFeed.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load past matches:', err);
            }
        }

    loadPastMatches();



    </script>




</body>
</html>
