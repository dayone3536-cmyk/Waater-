<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Debate Arena</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Inter,system-ui,sans-serif;
    }

    body{
        background:#0f1117;
        color:white;
        height:100vh;
        display:flex;
        flex-direction:column;
    }

    /* TOP BAR */

    .top-bar{
        height:75px;
        background:#151924;
        border-bottom:1px solid rgba(255,255,255,0.08);

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:0 30px;
    }

    .topic{
        font-size:1.2rem;
        font-weight:700;
        color:#46c2ff;
        flex: 1 ;


    }

    .timer{
        background:#22283a;
        padding:10px 18px;
        border-radius:999px;
        font-weight:700;
    }

    .watchers{
        color:#9ca3af;
    }

    /* DEBATERS */

    .debaters{
        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:20px 40px;
    }

    .user-card{
        display:flex;
        align-items:center;
        gap:15px;
    }

    .avatar{
        width:55px;
        height:55px;
        border-radius:50%;
        background:linear-gradient(
            135deg,
            #6d5dfc,
            #46c2ff
        );
    }

    .name{
        font-weight:700;
    }

    .role{
        color:#9ca3af;
        font-size:.9rem;
    }

    /* CHAT AREA */

    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 30px;

        display: flex;
        flex-direction: column;
        gap: 20px;

        background: #101521;
    }


    .argument {
        max-width: 65%;
        padding: 16px 20px;
        border-radius: 18px;
        line-height: 1.6;
        font-size: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }

    .left{
        align-self:flex-start;
        background:#1b2333;
    }

    .right{
        align-self:flex-end;

        background:linear-gradient(
            135deg,
            #6d5dfc,
            #4f7cff
        );
    }

    /* INPUT */

    .bottom-bar{

        padding:20px;

        background:#151924;

        border-top:1px solid rgba(255,255,255,0.08);

        display:flex;
        gap:15px;
    }

    .bottom-bar textarea{

        flex:1;

        resize:none;

        height:60px;

        border:none;

        outline:none;

        border-radius:16px;

        background:#1f2635;

        color:white;

        padding:16px;
    }

    .send-btn{

        border:none;

        cursor:pointer;

        border-radius:16px;

        padding:0 30px;

        color:white;

        font-weight:700;

        background:linear-gradient(
            135deg,
            #6d5dfc,
            #4f7cff
        );
    }

    .send-btn:hover{
        transform:translateY(-2px);
    }

    .message {
        background: #1f2937;
        color: white;
        padding: 12px 16px;
        margin: 10px 0;
        border-radius: 12px;
        max-width: 70%;
        word-wrap: break-word;
    }


    .mic-btn {

        border:none;
        cursor:pointer;
        border-radius:50%;
        width:56px;
        height:56px;
        flex-shrink:0;
        color:white;
        font-size:1.3rem;
        background:#2a3142;
        transition: background .2s;

    }

    .mic-btn.recording{

        background:#ff4d4d;
        animation: pulse 1.2s infinite;

    }

    @keyframes pulse{

        0%   { box-shadow: 0 0 0 0 rgba(255,77,77,.6); }
        70%  { box-shadow: 0 0 0 14px rgba(255,77,77,0); }
        100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); }

    } 

    /* momentum */

    .send-btn2 {

        border: none;
        cursor: pointer;
        border-radius: 50%;
        width: 56px;
        height: 56px;
        flex-shrink: 0;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #6d5dfc, #4f7cff);
        transition: transform .15s ease, filter .15s ease;

    }

    .send-btn2:hover {

        transform: translateY(-2px);

    }

    .send-btn2:active {
        transform: scale(.92);
    }

    .send-btn2 svg,
    .mic-btn svg {

        width: 22px;
        height: 22px;

    }

    .mic-btn {

        display: flex;
        align-items: center;
        justify-content: center;

    }



    .typing-indicator {

    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 18px;
    background: #1b2333;
    border-radius: 18px;
    width: fit-content;

    }

    .typing-indicator.left {

    align-self: flex-start;

    }

    .typing-indicator.right {

        align-self: flex-end;
        background: linear-gradient(135deg, #6d5dfc, #4f7cff);

    }

    .typing-indicator span {

        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #9ca3af;
        animation: typingBounce 1.2s infinite ease-in-out;

    }

    .typing-indicator span:nth-child(1){ animation-delay: 0s; }
    .typing-indicator span:nth-child(2){ animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3){ animation-delay: 0.4s; }

    @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); opacity: .5; }
        30% { transform: translateY(-6px); opacity: 1; }
    }
     /* .float-vote */
    .share-btn{
        display:flex;
        align-items:center;
        gap:8px;

        border:none;
        cursor:pointer;

        border-radius:999px;
        padding:10px 20px;

        color:white;
        font-weight:700;
        font-size:.9rem;

        background:linear-gradient(135deg,#6d5dfc,#4f7cff);
        box-shadow:0 4px 14px rgba(79,124,255,.35);

        transition:transform .2s, box-shadow .2s;
    }

    .share-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 6px 18px rgba(79,124,255,.5);
    }

    .share-btn:active{
        transform:translateY(0);
    }

    .share-btn svg{
        width:16px;
        height:16px;
    }

    .share-toast{
        position:fixed;
        bottom:90px;
        left:50%;
        transform:translateX(-50%) translateY(20px);
        background:#1f2635;
        color:white;
        padding:10px 20px;
        border-radius:999px;
        font-size:.85rem;
        font-weight:600;
        box-shadow:0 4px 20px rgba(0,0,0,.4);
        opacity:0;
        pointer-events:none;
        transition:opacity .25s, transform .25s;
        z-index:999;
    }

    .share-toast.show{
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }

    .vote-bar{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:40px;
        width:100%;
        padding:8px 0;
    }


    .vote-avatar-btn{
        background:none;
        border:none;
        outline:none;
        -webkit-tap-highlight-color: transparent;
        cursor:pointer;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:4px;
        flex-shrink:0;
        transition:transform .15s ease;
    }

    .vote-avatar-btn:hover{ transform:translateY(-2px); }
    .vote-avatar-btn:active{ transform:scale(.9); }



    .vote-avatar-btn .ring{
        width:44px;
        height:44px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:1.2rem;
        box-shadow:0 0 0 0 rgba(70,194,255,.5);
        z-index:1;
        

    }

    .vote-avatar-btn.left-side .ring{
        background:#000000;   /* matches your .left bubble */
    }

    .vote-avatar-btn.right-side .ring{
        background:#2563eb; /* matches your .right bubble */
    }

    .vote-avatar-btn.voted .ring{

        box-shadow: 0 0 0 4px rgba(255,255,255,.25), 0 0 16px currentColor;
    }

    .vote-avatar-btn.left-side.voted .ring{

        box-shadow: 0 0 0 4px rgba(255,255,255,.25), 0 0 16px #000000;
        outline: 2px solid #555;

    }

    .vote-avatar-btn.right-side.voted .ring{

        box-shadow: 0 0 0 4px rgba(255,255,255,.25), 0 0 16px #2563eb;
    }

    .momentum-bar{

        position:relative;
        height:6px;
        border-radius:999px;
        background:#1f2635;

        overflow:visible;
        margin:0 -8px;


        flex:1;

    }

    .momentum-marker{

        position:absolute;
        top:50%;
        left:50%;
        width:5px;

        height:64px;   /* was 44px — increase this to make it taller */
        border-radius:50%;
        background:#fff;

        box-shadow:0 0 8px rgba(255,255,255,.8);
        transform:translate(-50%,-50%);
        transition:left .6s cubic-bezier(.4,0,.2,1);
        z-index:2;

}




    .momentum-fill{

        position:absolute;
        top:0; left:0;
        height:100%;
        width:50%;
        border-radius:999px;
        background:linear-gradient(90deg,#6d5dfc,#46c2ff);
        transition:width .6s cubic-bezier(.4,0,.2,1);
    }

    .momentum-row{
        display:flex;
        align-items:center;
        gap:0;
        padding:4px 0 2px;
    }


    @keyframes votePulse{
        0%{ box-shadow:0 0 0 0 rgba(70,194,255,.6); }
        100%{ box-shadow:0 0 0 16px rgba(70,194,255,0); }
    }

    .vote-pct{
        font-size:.7rem;
        font-weight:700;
        color:#9ca3af;
        min-width:30px;
        text-align:center;
    }

    .crowd-lean{
        text-align:center;
        font-size:.72rem;
        color:#9ca3af;
        padding-bottom:4px;
        min-height:14px;
        transition:opacity .3s;
    }

    .crowd-lean.shift{
        color:#46c2ff;
    }

    .float-vote{
        position:fixed;
        pointer-events:none;
        font-size:1.1rem;
        font-weight:700;
        color:#46c2ff;
        animation:floatUp 1s ease-out forwards;
        z-index:1000;
    }

    @keyframes floatUp{
        0%{ opacity:1; transform:translateY(0); }
        100%{ opacity:0; transform:translateY(-50px); }
    }

    .voting-bar{
        padding:10px 20px 16px;
        background:#151924;
        border-top:1px solid rgba(255,255,255,0.08);
        display:none; /* shown via JS once we know the role */
    }

    .voting-bar.view-only .vote-avatar-btn{
        cursor:default;
        pointer-events:none;
    }


    .forfeit-overlay{
    position:fixed; inset:0;
    background:rgba(10,12,20,0.7);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    z-index:2000;
    animation:forfeitFadeIn .2s ease-out;
}

    @keyframes forfeitFadeIn{
        from{ opacity:0; }
        to{ opacity:1; }
    }

    .forfeit-box{
        background:#151924;
        border:1px solid rgba(255,255,255,0.08);
        border-radius:20px;
        padding:40px 36px 32px;
        max-width:420px;
        width:90%;
        text-align:center;
        box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,0.02);
        animation:forfeitPop .25s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes forfeitPop{
        from{ opacity:0; transform:scale(.9) translateY(10px); }
        to{ opacity:1; transform:scale(1) translateY(0); }
    }

    .forfeit-icon{
        width:60px;
        height:60px;
        margin:0 auto 18px;
        border-radius:50%;
        background:linear-gradient(135deg, rgba(239,68,68,.18), rgba(239,68,68,.05));
        border:1px solid rgba(239,68,68,.3);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:1.6rem;
    }

    .forfeit-box p{
        margin-bottom:8px;
        font-weight:700;
        font-size:1.25rem;
    }

    .forfeit-sub{
        color:#9ca3af;
        font-size:.92rem;
        margin-bottom:28px;
        line-height:1.5;
    }

    .forfeit-actions{
        display:flex;
        gap:12px;
        justify-content:center;
    }

    .forfeit-btn{
        border:none;
        cursor:pointer;
        padding:14px 0;
        flex:1;
        border-radius:12px;
        font-weight:700;
        font-size:1rem;
        transition:transform .15s ease, filter .15s ease;
    }

    .forfeit-btn:hover{
        transform:translateY(-1px);
        filter:brightness(1.1);
    }

    .forfeit-btn:active{
        transform:translateY(0);
        filter:brightness(.95);
    }

    .forfeit-btn.no{
        background:linear-gradient(135deg, #ef4444, #dc2626);
        color:white;
        box-shadow:0 4px 14px rgba(239,68,68,.35);
    }

    .forfeit-btn.yes{
        background:#242b3d;
        color:white;
        border:1px solid rgba(255,255,255,0.06);
    }


    @media (max-width: 600px){

        /* TOP BAR */

        .top-bar{
            height:auto;
            padding:16px;
            flex-direction:column;
            gap:12px;
        }

        .topic{
            text-align : center;

            font-size : 1rem;

            line-height : 1.4;

            font-weight : 200;

        }


        .debaters{
            display: none;
        }

        .user-card{

            display: none;
        }

        .avatar{
            display: none;
        }

        .debaters h2{
            display: none;
        }

        /* CHAT */

        .chat-container{
            padding:16px;
            gap:14px;

        }

        .argument{
            max-width:92%;
            font-size:14px;
            padding:14px 16px;

        }

        /* INPUT BAR */

        .bottom-bar{
            padding:12px;
            gap:10px;

        }

        .bottom-bar textarea{
            height:54px;
            font-size:15px;
            padding:14px;

        }

        .send-btn {
            height:54px;
            padding:0 18px;
            flex-shrink:0;
        }

    }







</style>

<script>

    console.log("1 ststep")

    const socket = io();

    const params =
        new URLSearchParams(
            window.location.search
        );

    

    const roomId = params.get('match');


    let currentRoomId = roomId;

    const role = params.get('role');

    const dynamic_title = document.getElementById("Topic");

    let isSpectator = false;

        // opponent_typing typingBubble  sendBtn  messageInput  loadReplayMode  cast_vote
    

    console.log("the join_room socket has been sent to the server")

    socket.on("macth_info", (data) => {

        console.log("the macth info socket has been recieved from the server")

        const title = data.thesis

        console.log("title =", title); 

        dynamic_title.textContent = title;


        console.log("2nd ststep")

    });

    socket.on("match_error", (data) => {

        alert(data.message);
        window.location.href = '/';
    });


// you_are_spectator

    const micBtn = document.getElementById('micBtn');


    const isReplay = params.get('replay') === '1';

    if (isReplay) {

        loadReplayMode(roomId);

    } else {

        socket.emit("join_room", { roomId, role });
    }

    if (role === 'creator' || role === 'challenger') {

        setupVotingBar();

    }

    if ((role === 'creator' || role === 'challenger') && !isReplay) {

        setupForfeitGuard();

    }



    // messageInput replay 

    socket.on('match_history', (messages) => {

        messages.forEach(arg => {
            const div = document.createElement('div');
            div.classList.add('argument');
            
            div.classList.add(arg.sender_role === 'creator' ? 'right' : 'left');

            div.textContent = arg.message;
            chat.appendChild(div);
        });
        chat.scrollTop = 0;
    });

// update_live_matches
    let typingBubble = null;

    socket.on('opponent_typing', (data) => {

        if (!typingBubble) {
            typingBubble = document.createElement('div');

            typingBubble.classList.add('typing-indicator');
            typingBubble.classList.add(data.senderRole === 'creator' ? 'right' : 'left');


            typingBubble.innerHTML = '<span></span><span></span><span></span>';

            chat.appendChild(typingBubble);
            chat.scrollTop = chat.scrollHeight;

        }
    });

    socket.on('opponent_stop_typing', () => {
        if (typingBubble) {
            typingBubble.remove();
            typingBubble = null;
        }
    });
    


    async function loadReplayMode(roomId) {

        document.querySelector('.bottom-bar').style.display = 'none';

        const matchesRes = await fetch('/past-matches');
        const matches = await matchesRes.json();
        const match = matches.find(m => m.room_id === roomId);
        dynamic_title.textContent = match ? match.thesis : 'Replay';

        const votesRes = await fetch(`/past-matches/${roomId}/votes`);
        const tally = await votesRes.json();
        renderReplayVoteBar(roomId, tally);

        const argsRes = await fetch(`/past-matches/${roomId}/arguments`);
        const args = await argsRes.json();

        args.forEach(arg => {
            const div = document.createElement('div');
            div.classList.add('argument');
            div.classList.add(arg.sender_role === 'creator' ? 'right' : 'left');
            div.textContent = arg.message;
            chat.appendChild(div);
        });

        chat.scrollTop = 0;
    }

    function renderReplayVoteBar(roomId, tally) {

        const votingBar = document.getElementById('votingBar');
        votingBar.style.display = 'block';
        votingBar.classList.remove('view-only'); // <-- key change: replay voting is now interactive

        updateVoteDisplay(tally.pro, tally.against);

        currentVote = tally.myVote || null;
        if (currentVote) {
            const votedBtn = currentVote === 'pro'
                ? document.getElementById('voteRightBtn')
                : document.getElementById('voteLeftBtn');
            votedBtn.classList.add('voted');
        }

        document.getElementById('voteLeftBtn').onclick  = (e) => castReplayVote(roomId, 'against', e);
        document.getElementById('voteRightBtn').onclick = (e) => castReplayVote(roomId, 'pro', e);
    }

    function updateVoteDisplay(proVotes, againstVotes) {

        const total = proVotes + againstVotes;
        const rightPct = total === 0 ? 50 : Math.round((proVotes / total) * 100);
        const leftPct = 100 - rightPct;

        document.getElementById('momentumFill').style.width = rightPct + '%';
        document.getElementById('momentumMarker').style.left = rightPct + '%';
        document.getElementById('leftPct').textContent = leftPct + '%';
        document.getElementById('rightPct').textContent = rightPct + '%';

        document.getElementById('crowdLean').textContent = total > 0
            ? `${Math.max(rightPct, leftPct)}% lean · ${total} votes`

            : 'Share to your friends and let them decide';
    }

    async function castReplayVote(roomId, side, evt) {

        if (!(await window.requireLogin())) return;   

        if (currentVote === side) return;

        const btn = evt.currentTarget;
        document.querySelectorAll('.vote-avatar-btn').forEach(b => b.classList.remove('voted'));
        btn.classList.add('voted');
        currentVote = side;

        const rect = btn.getBoundingClientRect();
        const float = document.createElement('div');
        float.className = 'float-vote';
        float.textContent = '+1';
        float.style.left = rect.left + rect.width / 2 - 10 + 'px';
        float.style.top = rect.top + 'px';
        document.body.appendChild(float);
        setTimeout(() => float.remove(), 1000);

        try {
            const res = await fetch(`/past-matches/${roomId}/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ side })
            });
            const tally = await res.json();
            updateVoteDisplay(tally.pro, tally.against);
        } catch (err) {
            console.error('Vote failed:', err);
        }
    }

      // ---- VOICE INPUT (WhatsApp style) ----

      const micIconMic = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>

    micBtn.innerHTML = micIconMic; // set initial icon on load



    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

    } else {

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // or 'ml-IN', or wire up your language selector
        recognition.continuous = true;       // keep listening
        recognition.interimResults = false;

        let isRecording = false;
        let userStoppedManually = false;

        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                userStoppedManually = true;
                recognition.stop();
                return;
            }
            userStoppedManually = false;
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                recognition.start();
            } catch (e) {
                alert('Microphone access is blocked.');
            }
        });

        recognition.onstart = () => {

            isRecording = true;
            micBtn.classList.add('recording');

            micBtn.innerHTML = micIconStop;
            
        };

        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');

            micBtn.innerHTML = micIconMic;

            // If it stopped on its own (not because the user tapped stop), restart it

            if (!userStoppedManually) {
                try {
                    recognition.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    micBtn.innerHTML = micIconStop;

                } catch (e) {
                    console.error('Auto-restart failed', e);

        };

        recognition.onerror = (event) => {

                alert('Microphone access is blocked for this site. Click the icon next to the URL bar, go to Site settings, and set Microphone to "Allow".');

    /* ---------------- DWELL TIME TRACKING ---------------- */

    let dwellViewStart = Date.now();
    let dwellAccumulatedMs = 0;

    let dwellIsVisible = !document.hidden;
    let dwellRoomId = currentRoomId; // tracks whichever room they're currently viewing


    document.addEventListener('visibilitychange', () => {

        if (document.hidden) {

            dwellAccumulatedMs += Date.now() - dwellViewStart;

            dwellIsVisible = false;

        } else {
            dwellViewStart = Date.now();

            dwellIsVisible = true;

        }
    });

    function flushDwellTime() {

        if (dwellIsVisible) {
            dwellAccumulatedMs += Date.now() - dwellViewStart;

        }

        dwellViewStart = Date.now();


        if (dwellAccumulatedMs < 1000 || !dwellRoomId) {

            dwellAccumulatedMs = 0;
            return;
        }

        const payload = JSON.stringify({

            roomId: dwellRoomId,
            seconds: Math.round(dwellAccumulatedMs / 1000)

        });

        const blob = new Blob([payload], { type: 'application/json' });

        navigator.sendBeacon('/engagement/dwell', blob);

        dwellAccumulatedMs = 0;
    }



    // Heartbeat every 20s so long sessions aren't lost

    // Flush on tab close / navigation away

    window.addEventListener('beforeunload', flushDwellTime);

    function setupVotingBar() {

        const votingBar = document.getElementById('votingBar');

        const leftBtn = document.getElementById('voteLeftBtn');

    let currentVote = null; // 'pro' or 'against', null = not voted yet
    let lastPct = 50;

    async function castVote(side, evt){

        if (!(await window.requireLogin())) return;

        if (currentVote === side) return; // already voted this side
        currentVote = side;

        const btn = evt.currentTarget;
        btn.classList.add('pulse', 'voted');

        document.querySelectorAll('.vote-avatar-btn').forEach(b => {

            if (b !== btn) {
                b.style.opacity = '0.4';
                b.classList.remove('voted');
            } else {
                b.style.opacity = '1';
            }

        });


        // floating +1 feedback right where they tapped castVote

        const rect = btn.getBoundingClientRect();
        const float = document.createElement('div');
        float.className = 'float-vote';

        float.textContent = '+1';
        float.style.left = rect.left + rect.width / 2 - 10 + 'px';

        float.style.top = rect.top + 'px';
        document.body.appendChild(float);

        setTimeout(() => float.remove(), 1000);

        socket.emit('cast_vote', { roomId: currentRoomId, side });
    }

    socket.on('vote_update', (data) => {

    // data: { proVotes, againstVotes }

        const total = data.proVotes + data.againstVotes;

        const rightPct = total === 0 ? 50 : Math.round((data.proVotes / total) * 100);
        const leftPct = 100 - rightPct;

        const fill = document.getElementById('momentumFill');
        if (fill) fill.style.width = rightPct + '%';

        const marker = document.getElementById('momentumMarker');
        if (marker) marker.style.left = rightPct + '%';

        const leftEl = document.getElementById('leftPct');
        const rightEl = document.getElementById('rightPct');
        if (leftEl) leftEl.textContent = leftPct + '%';
        if (rightEl) rightEl.textContent = rightPct + '%';

        const lean = document.getElementById('crowdLean');
        if (lean && total > 0) {
            const leadingSide = rightPct >= leftPct ? 'Right' : 'Left';
            const margin = Math.abs(rightPct - leftPct);

            if (margin < 5) {
                lean.textContent = `🔥 Dead even — ${total} votes in`;
            } else {
                lean.textContent = `Crowd is leaning ${leadingSide} (${Math.max(rightPct,leftPct)}%) · ${total} votes`;
            }

            if (rightPct !== lastPct) {
                lean.classList.add('shift');
                setTimeout(() => lean.classList.remove('shift'), 600);
            }
            lastPct = rightPct;
        }
    });

    /* ---------------- REELS-STYLE HORIZONTAL SWIPE (LIVE + REPLAY) ---------------- */

    let liveMatches = [];
    let pastMatches = [];


    let canSwipe = false;     // true once we know we're allowed to swipe (spectator OR replay)
    let isSwitching = false;

    socket.on('update_live_matches', (matches) => {
        liveMatches = matches;
    });

    // If replaying, fetch past matches once so we have a list to swipe through

    if (isReplay) {
        fetch('/past-matches')
            .then(res => res.json())
            .then(matches => {
                pastMatches = matches;
                canSwipe = true;
                showSwipeHint();
            });
    }

    function getCurrentIndex(list, key) {
        return list.findIndex(m => m[key] === currentRoomId);
    }

    function clearChatUI() {
        chat.innerHTML = '';
        if (typingBubble) { typingBubble.remove(); typingBubble = null; }
        dynamic_title.textContent = 'loading topic...';
    }
    

    function switchToLiveMatch(newRoomId) {

        if (isSwitching || newRoomId === currentRoomId) return;
        isSwitching = true;

        flushDwellTime();

        socket.emit('leave_room', { roomId: currentRoomId });
        clearChatUI();

        currentRoomId = newRoomId;
        socket.emit('join_room', { roomId: newRoomId, role: null });

        window.history.replaceState({}, '', `${window.location.pathname}?match=${newRoomId}`);
        setTimeout(() => { isSwitching = false; }, 400);
    }


    function switchToReplay(newRoomId) {

        if (isSwitching || newRoomId === currentRoomId) return;

        isSwitching = true;

        flushDwellTime();


        clearChatUI();

        currentRoomId = newRoomId;

        dwellRoomId = newRoomId;

        loadReplayMode(newRoomId).then(() => {
            window.history.replaceState({}, '', `${window.location.pathname}?replay=1&match=${newRoomId}`);
            isSwitching = false;

        });

    }

    function goToNextDebate() {
        if (isReplay) {
            if (pastMatches.length === 0) return;
            const idx = getCurrentIndex(pastMatches, 'room_id');
            const nextIdx = idx === -1 ? 0 : (idx + 1) % pastMatches.length;
            switchToReplay(pastMatches[nextIdx].room_id);
        } else {
            if (liveMatches.length === 0) return;
            const idx = getCurrentIndex(liveMatches, 'roomId');
            const nextIdx = idx === -1 ? 0 : (idx + 1) % liveMatches.length;
            switchToLiveMatch(liveMatches[nextIdx].roomId);
        }
    }

    function goToPrevDebate() {
        if (isReplay) {
            if (pastMatches.length === 0) return;
            const idx = getCurrentIndex(pastMatches, 'room_id');
            const prevIdx = idx === -1 ? 0 : (idx - 1 + pastMatches.length) % pastMatches.length;
            switchToReplay(pastMatches[prevIdx].room_id);
        } else {
            if (liveMatches.length === 0) return;
            const idx = getCurrentIndex(liveMatches, 'roomId');
            const prevIdx = idx === -1 ? 0 : (idx - 1 + liveMatches.length) % liveMatches.length;
            switchToLiveMatch(liveMatches[prevIdx].roomId);
        }
    }

    /* ---- Touch swipe: HORIZONTAL ---- statusLabel  */
    let touchStartX = 0;

    document.addEventListener('touchstart', (e) => {
        if (!canSwipe) return;
        touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        if (!canSwipe) return;
        const diff = touchStartX - e.changedTouches[0].clientX;

        if (Math.abs(diff) < 50) return; // ignore tiny swipes

        if (diff > 0) {
            goToNextDebate(); // swiped left -> next
        } else {
            goToPrevDebate(); // swiped right -> previous join_room
        }
    }, { passive: true });

    /* ---- Mouse wheel: horizontal scroll OR shift+wheel ----  */ 


    let wheelLock = false;
    document.addEventListener('wheel', (e) => {
        if (!canSwipe || wheelLock) return;

        // Only react to horizontal scroll intent (trackpad swipe / shift+wheel)
        // Ignore vertical scrolling entirely so users can scroll to read messages
        
        if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return;
        if (Math.abs(e.deltaX) < 30) return;

        wheelLock = true;
        if (e.deltaX > 0) goToNextDebate();
        else goToPrevDebate();

        setTimeout(() => { wheelLock = false; }, 500);
    }, { passive: true });


    /* ---- Arrow keys: LEFT/RIGHT ---- */
    document.addEventListener('keydown', (e) => {
        if (!canSwipe) return;
        if (e.key === 'ArrowRight') goToNextDebate();
        if (e.key === 'ArrowLeft') goToPrevDebate();
    });

    function showSwipeHint() {

        `;
        document.body.appendChild(hint) ;
        setTimeout(() => hint.remove(), 3000);
