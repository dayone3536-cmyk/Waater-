<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Debate Arena</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Inter,system-ui,sans-serif;
    }

    body{
        background:#0f1117;
        color:white;
        height:100vh;
        display:flex;
        flex-direction:column;
    }

    /* TOP BAR */

    .top-bar{
        height:75px;
        background:#151924;
        border-bottom:1px solid rgba(255,255,255,0.08);

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:0 30px;
    }

    .topic{
        font-size:1.2rem;
        font-weight:700;
        color:#46c2ff;
        min-width: 90%;


    }

    .timer{
        background:#22283a;
        padding:10px 18px;
        border-radius:999px;
        font-weight:700;
    }

    .watchers{
        color:#9ca3af;
    }

    /* DEBATERS */

    .debaters{
        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:20px 40px;
    }

    .user-card{
        display:flex;
        align-items:center;
        gap:15px;
    }

    .avatar{
        width:55px;
        height:55px;
        border-radius:50%;
        background:linear-gradient(
            135deg,
            #6d5dfc,
            #46c2ff
        );
    }

    .name{
        font-weight:700;
    }

    .role{
        color:#9ca3af;
        font-size:.9rem;
    }

    /* CHAT AREA */

    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 30px;

        display: flex;
        flex-direction: column;
        gap: 20px;

        background: #101521;
    }


    .argument {
        max-width: 65%;
        padding: 16px 20px;
        border-radius: 18px;
        line-height: 1.6;
        font-size: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }

    .left{
        align-self:flex-start;
        background:#1b2333;
    }

    .right{
        align-self:flex-end;

        background:linear-gradient(
            135deg,
            #6d5dfc,
            #4f7cff
        );
    }

    /* INPUT */

    .bottom-bar{

        padding:20px;

        background:#151924;

        border-top:1px solid rgba(255,255,255,0.08);

        display:flex;
        gap:15px;
    }

    .bottom-bar textarea{

        flex:1;

        resize:none;

        height:60px;

        border:none;

        outline:none;

        border-radius:16px;

        background:#1f2635;

        color:white;

        padding:16px;
    }

    .send-btn{

        border:none;

        cursor:pointer;

        border-radius:16px;

        padding:0 30px;

        color:white;

        font-weight:700;

        background:linear-gradient(
            135deg,
            #6d5dfc,
            #4f7cff
        );
    }

    .send-btn:hover{
        transform:translateY(-2px);
    }

    .message {
        background: #1f2937;
        color: white;
        padding: 12px 16px;
        margin: 10px 0;
        border-radius: 12px;
        max-width: 70%;
        word-wrap: break-word;
    }


    .mic-btn {

        border:none;
        cursor:pointer;
        border-radius:50%;
        width:56px;
        height:56px;
        flex-shrink:0;
        color:white;
        font-size:1.3rem;
        background:#2a3142;
        transition: background .2s;

    }

    .mic-btn.recording{

        background:#ff4d4d;
        animation: pulse 1.2s infinite;

    }

    @keyframes pulse{

        0%   { box-shadow: 0 0 0 0 rgba(255,77,77,.6); }
        70%  { box-shadow: 0 0 0 14px rgba(255,77,77,0); }
        100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); }

    }

    .typing-indicator {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 18px;
    background: #1b2333;
    border-radius: 18px;
    width: fit-content;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #9ca3af;
        animation: typingBounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1){ animation-delay: 0s; }
    .typing-indicator span:nth-child(2){ animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3){ animation-delay: 0.4s; }

    @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); opacity: .5; }
        30% { transform: translateY(-6px); opacity: 1; }
    }

    @media (max-width: 600px){

        /* TOP BAR */

        .top-bar{
            height:auto;
            padding:16px;
            flex-direction:column;
            gap:12px;
        }

        .topic{
            text-align : center;

            font-size : 1rem;

            line-height : 1.4;

            font-weight : 200;

        }


        .debaters{
            display: none;
        }

        .user-card{

            display: none;
        }

        .avatar{
            display: none;
        }

        .debaters h2{
            display: none;
        }

        /* CHAT */

        .chat-container{
            padding:16px;
            gap:14px;

        }

        .argument{
            max-width:92%;
            font-size:14px;
            padding:14px 16px;

        }

        /* INPUT BAR */

        .bottom-bar{
            padding:12px;
            gap:10px;

        }

        .bottom-bar textarea{
            height:54px;
            font-size:15px;
            padding:14px;

        }

        .send-btn {
            height:54px;
            padding:0 18px;
            flex-shrink:0;
        }

    }







</style>


</head>
<body>

<div class="top-bar">

    <div class="topic" id="Topic">
        loading topic...


        <!-- Paste the topic of the duel -->
    </div>





</div>

<div class="debaters">

    <div class="user-card">

        <div class="avatar"></div>

        <div>
            <div class="name">You</div>
            <div class="role">Pro Position</div>
        </div>

    </div>

    <h2>VS</h2>

    <div class="user-card">

        <div class="avatar"></div>

        <div>
            <div class="name">Opponent</div>
            <div class="role">Against Position</div>

        </div>

    </div>

</div>


<div id="chat" class="chat-container">
    <!-- messages  -->
</div>


<div class="bottom-bar">

    <textarea
    id="message"
        placeholder="Present your argument..."
    ></textarea>


    <button class="mic-btn" id="micBtn" type="button" title="Hold to talk">
        🎤
    </button>


    <button class="send-btn" id="sendBtn" type="submit">
        Send
    </button>

</div>


<script src="/socket.io/socket.io.js"></script>

<script>

    console.log("1 ststep")

    const socket = io();

    const params =
        new URLSearchParams(
            window.location.search
        );

    const roomId =
        params.get('match');

    const role = params.get('role');

    const dynamic_title = document.getElementById("Topic");

    

    console.log("the join_room socket has been sent to the server")

    socket.on("macth_info", (data) => {

        console.log("the macth info socket has been recieved from the server")

        const title = data.thesis

        console.log("title =", title); 

        dynamic_title.textContent = title;


        console.log("2nd ststep")

    });

    socket.on("match_error", (data) => {

        alert(data.message);
        window.location.href = '/';
    });


// you_are_spectator
    const isReplay = params.get('replay') === '1';

    if (isReplay) {

        loadReplayMode(roomId);

    } else {

        socket.emit("join_room", { roomId, role });
    }

    // messageInput 

        
    let typingBubble = null;

    socket.on('opponent_typing', () => {

        if (!typingBubble) {
            typingBubble = document.createElement('div');

            typingBubble.classList.add('typing-indicator');
            typingBubble.id = 'typingBubble';

            typingBubble.innerHTML = '<span></span><span></span><span></span>';

            chat.appendChild(typingBubble);
            chat.scrollTop = chat.scrollHeight;
        }
    });

    socket.on('opponent_stop_typing', () => {
        if (typingBubble) {
            typingBubble.remove();
            typingBubble = null;
        }
    });
    


    async function loadReplayMode(roomId) {

        document.querySelector('.bottom-bar').style.display = 'none';

        const matchesRes = await fetch('/past-matches');

        const matches = await matchesRes.json();

        const match = matches.find(m => m.room_id === roomId);

        dynamic_title.textContent = match ? match.thesis : 'Replay';


        const argsRes = await fetch(`/past-matches/${roomId}/arguments`);
        const args = await argsRes.json();

        args.forEach(arg => {

            const div = document.createElement('div');

            div.classList.add('argument');

            div.classList.add(arg.sender_role === 'creator' ? 'right' : 'left');

            div.textContent = arg.message;

            if (typingBubble) {

                typingBubble.remove();
                typingBubble = null;
            }


            chat.appendChild(div);
            
        });


        chat.scrollTop = chat.scrollHeight;
    }



    
        console.log("roomId =", roomId);
        console.log("role =", role);

        const sendBtn =
            document.getElementById('sendBtn');

        const messageInput =
            document.getElementById('message');

        messageInput.addEventListener('keydown', (event) => {

            if (event.key === 'Enter' && !event.shiftKey) {

                    event.preventDefault(); // stops new line

                    if (messageInput.value.trim() != "") {

                        sendBtn.click();

                    }

                }

            });


      // ---- VOICE INPUT (WhatsApp style) ----

    const micBtn = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        micBtn.style.display = 'none';
    } else {

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // or 'ml-IN', or wire up your language selector
        recognition.continuous = true;       // keep listening
        recognition.interimResults = false;

        let isRecording = false;
        let userStoppedManually = false;

        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                userStoppedManually = true;
                recognition.stop();
                return;
            }
            userStoppedManually = false;
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                recognition.start();
            } catch (e) {
                alert('Microphone access is blocked.');
            }
        });

        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.textContent = '⏹️';
        };

        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
            micBtn.textContent = '🎤';

            // If it stopped on its own (not because the user tapped stop), restart it
            if (!userStoppedManually) {
                try {
                    recognition.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    micBtn.textContent = '⏹️';
                } catch (e) {
                    console.error('Auto-restart failed', e);
                }
            }
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            if (event.error === 'not-allowed') {
                alert('Microphone access is blocked for this site. Click the icon next to the URL bar, go to Site settings, and set Microphone to "Allow".');
                userStoppedManually = true; // don't loop-restart on permission errors
            }
        };

        recognition.onresult = (event) => {
            const lastResult = event.results[event.results.length - 1];
            const transcript = lastResult[0].transcript.trim();

            if (transcript) {
                const existing = messageInput.value.trim();
                messageInput.value = existing ? existing + ' ' + transcript : transcript;
                messageInput.focus();
            }
        };
    }


// recognition.onresult chat.appendChild(div)


    const chat =
        document.getElementById('chat');



    let typingTimeout;

    messageInput.addEventListener('input', () => {

        socket.emit('typing', { roomId });

        clearTimeout(typingTimeout);

        typingTimeout = setTimeout(() => {

            socket.emit('stop_typing', { roomId });

        }, 1500); // stops the "typing" status after 1.5s of inactivity

    });

    // Also stop typing indicator immediately when message is sent

    sendBtn.onclick = () => {

        clearTimeout(typingTimeout);

        socket.emit('stop_typing', { roomId });


        socket.emit(
            'send_argument',
            { roomId, message: messageInput.value }

        );

        messageInput.value = '';
    };



    // sendBtn.onclick = () => {

    //     socket.emit(
    //         'send_argument',
    //         {
    //             roomId,
    //             message:
    //                 messageInput.value
    //         }
    //     );

    //     messageInput.value = '';
    // };





    socket.on(
        'new_argument',
        (data) => {

            const div = document.createElement('div');

            div.classList.add('argument');

            // 2. Compare the sender's ID with YOUR unique socket ID

            if (data.senderRole === 'creator') {
                
                div.classList.add('right');

            } else {

                div.classList.add('left');
            }

            div.textContent = data.message;

            chat.appendChild(div);

            chat.scrollTop = chat.scrollHeight


        }
    );

    let turnUIInterval;

// The server tells us a new 60-second window has begun
    socket.on('turn_started', (data) => {
        const { activePlayerId, secondsLeft } = data;
        const isMyTurn = (activePlayerId === socket.id);
        
        const statusLabel = document.getElementById('turn-status-text');
        const visualClock = document.getElementById('countdown-clock');
        const inputTextArea = document.getElementById('argument-input-box');
        const submitBtn = document.getElementById('submit-argument-btn');

        // Wipe any old local UI clock tickers running from the last turn
        
        clearInterval(turnUIInterval);

        // Toggle interactive access based on whose turn it is

        if (isMyTurn) {
            statusLabel.innerHTML = `⚡ <span class="text-green-400 font-bold">YOUR TURN!</span> Reply before the clock hits zero!`;
            if (inputTextArea) inputTextArea.disabled = false;
            if (submitBtn) submitBtn.disabled = false;
        } else {
            statusLabel.innerHTML = `⏳ Opponent is drafting a counter-argument...`;
            if (inputTextArea) inputTextArea.disabled = true; // Lock their keyboard!
            if (submitBtn) submitBtn.disabled = true;
        }

        // Run a local clock loop purely to make the numbers count down smoothly on screen
        let currentSeconds = secondsLeft;
        
        if (visualClock) {
            visualClock.innerText = `${currentSeconds}s`;
            visualClock.style.color = "#f59e0b"; // Default Amber warning color
        }

        turnUIInterval = setInterval(() => {
            currentSeconds--;
            if (visualClock) {
                visualClock.innerText = `${currentSeconds}s`;
                
                // Turn the clock red and flash if they have less than 10 seconds left
                if (currentSeconds <= 10) {
                    visualClock.style.color = "#ef4444"; // Red
                    visualClock.classList.add('animate-pulse');
                }
            }

            if (currentSeconds <= 0) {
                clearInterval(turnUIInterval);
            }
        }, 1000);
    });



    socket.on('match_ended_lost', (data) => {
        clearInterval(turnUIInterval);
        alert(data.reason);
        window.location.href = '/'; // Kick them to lobby
    });


    socket.on('match_ended_won', (data) => {
        clearInterval(turnUIInterval);
        alert(data.reason);
        window.location.href = '/'; // Take them back victorious
    });


    socket.on('match_ended_draw', (data) => {
        clearInterval(turnUIInterval);
        alert(data.reason);
        window.location.href = '/';

    });


    
    socket.on('you_are_spectator', () => {

        const bottomBar = document.querySelector('.bottom-bar');
        
        bottomBar.innerHTML = `
            <div style="width:100%; text-align:center; color:#9ca3af; font-size:.9rem; padding:10px 0;">
                👁 You're spectating this duel
            </div>
        `;



        document.getElementById('message').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('sendBtn').textContent = '👁 Watching';

        document.querySelector('.bottom-bar').insertAdjacentHTML('afterbegin', `
            <div style="color:#9ca3af; font-size:.9rem; align-self:center;">
                👁 Spectating — you cannot send messages
            </div>
        `);
    });

    // Also add match ended handler (for when a player disconnects mid-match)
    socket.on('match_ended', (data) => {
        alert(data.reason);
        window.location.href = '/';
    });


</script>


</body>
</html>
